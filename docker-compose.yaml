services:
  owdp-sta:
    image: fraunhoferiosb/frost-server:latest
    environment:
      # For all settings see: https://fraunhoferiosb.github.io/FROST-Server/settings/settings.html
      - serviceRootUrl=http://localhost:8999/FROST-Server
      - plugins_multiDatastream_enable=false
      - http_cors_enable=true
      - http_cors_allowed_origins=*
      - persistence_db_driver=org.postgresql.Driver
      - persistence_db_url=jdbc:postgresql://owdp-database:5432/sensorthings
      - persistence_db_username=sensorthings
      - persistence_db_password=ChangeMe
      - persistence_autoUpdateDatabase=true
      - persistence_idGenerationMode=ServerAndClientGenerated
      - plugins_coreModel_idType_thing=STRING
      - plugins_coreModel_idType_location=STRING
    depends_on:
      owdp-database:
        condition: service_healthy

  owdp-database:
    container_name: owdp-database
    build:
      context: ./docker/database
    environment:
      - POSTGRES_DB=sensorthings
      - POSTGRES_USER=sensorthings
      - POSTGRES_PASSWORD=ChangeMe
    volumes:
      - postgis_volume:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d sensorthings -U sensorthings "]
      interval: 10s
      timeout: 5s
      retries: 5

  owdp-pygeoapi:
    container_name: owdp-pygeoapi
    build:
      context: docker/pygeoapi
    depends_on:
      - owdp-sta
    environment:
      - WIS2BOX_API_URL=http://localhost:8999/oapi
      - WIS2BOX_API_BACKEND_URL=http://frost-http:8080/FROST-Server/v1.1
      - SCRIPT_NAME=/oapi

  owdp-ui:
    image: internetofwater/hub2box-ui:iow
    container_name: owdp-ui
    depends_on:
      - owdp-pygeoapi
    environment:
      - WIS2BOX_URL=http://localhost:8999
      - WIS2BOX_API_URL=http://localhost:8999/oapi
      - serviceRootUrl=http://localhost:8999/FROST-Server

  web-proxy:
    container_name: web-proxy
    build:
      context: docker/nginx
    restart: always
    depends_on:
      - owdp-ui
    ports:
      - 8999:80

volumes:
    postgis_volume:
